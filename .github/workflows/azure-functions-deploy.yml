name: Build, Test, and Deploy Azure Function

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'invoice-backend-app' #  matches your Azure portal!
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: '.'

jobs:
  build-test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: 'Setup DotNet Environment'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Restore Dependencies'
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: 'Build Project'
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      # --- THE QUALITY GATES ---
      
      # Gate 1: Run ONLY the Unit Tests (No database needed)
      - name: 'Run Unit Tests'
        run: dotnet test ./InvoiceBackend.Tests/InvoiceBackend.Tests.csproj --configuration Release --no-build --verbosity normal

      # Gate 2: Dynamically create the appsettings.json using a GitHub Secret!
      
      - name: 'Inject Cosmos DB Secret for Integration Tests'
        run: |
          echo '{ "ConnectionStrings": { "CosmosDb": "${{ secrets.COSMOS_DB_TEST_CONNECTION }}" } }' > ./InvoiceBackend.IntegrationTests/appsettings.json

      # Gate 3: Run the Integration Tests
      - name: 'Run Integration Tests'
        run: dotnet test ./InvoiceBackend.IntegrationTests/InvoiceBackend.IntegrationTests.csproj --configuration Release --no-build --verbosity normal

      # --- THE DEPLOYMENT ---
      
      # Only runs if ALL tests above get green checkmarks!
      - name: 'Publish Project artifacts'
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --output ./output --no-build

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: ./output
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}