name: CI - Full Stack Azure Function .NET 8 & Angular Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: '.'

jobs:
  # ---------------------------------------------
  # JOB 1: Build and Test the C# Backend
  # ---------------------------------------------
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Setup .NET Environment'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Restore Dependencies'
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: 'Build Azure Function Project'
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: 'Run Unit Tests'
        run: dotnet test ./InvoiceBackend.Tests/InvoiceBackend.Tests.csproj --configuration Release --no-build --verbosity normal

  # ---------------------------------------------
  # JOB 2: Build the Angular Frontend
  # ---------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x' 

      - name: 'Install NPM Packages'
        working-directory: ./invoice-generator
        run: npm install

      - name: 'Build Angular Application'
        working-directory: ./invoice-generator
        run: npm run build