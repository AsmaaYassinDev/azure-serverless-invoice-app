name: Azure Function .NET 8 Build & Test Verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: '.'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@v4

      - name: 'Setup .NET Environment'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 'Restore Dependencies'
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: 'Build Azure Function Project'
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      # THE FIX: Point EXACTLY to the Unit Test project file, not the root folder
      - name: 'Run Unit Tests'
        run: dotnet test ./InvoiceBackend.Tests/InvoiceBackend.Tests.csproj --configuration Release --no-build --verbosity normal